<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-label="QuizMD quickstart terminal snapshot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1100" height="560" fill="url(#bg)" rx="18"/>
  <rect x="20" y="20" width="1060" height="48" fill="#1f2937" rx="10"/>
  <circle cx="50" cy="44" r="8" fill="#ef4444"/>
  <circle cx="74" cy="44" r="8" fill="#f59e0b"/>
  <circle cx="98" cy="44" r="8" fill="#10b981"/>
  <text x="140" y="50" fill="#cbd5e1" font-family="Menlo, Monaco, Consolas, monospace" font-size="20">quizmd quickstart</text>

  <g fill="#e5e7eb" font-family="Menlo, Monaco, Consolas, monospace" font-size="24">
    <text x="44" y="120">$ pip install quizmd</text>
    <text x="44" y="165">$ quizmd init</text>
    <text x="44" y="210">$ quizmd --validate hello-quiz.md</text>
    <text x="44" y="255">Validation passed: Hello Quiz (3 questions)</text>
    <text x="44" y="300">$ quizmd hello-quiz.md</text>
  </g>

  <g fill="#34d399" font-family="Menlo, Monaco, Consolas, monospace" font-size="22">
    <text x="44" y="360">Question 1/3  ███░░░░░░░</text>
    <text x="44" y="395">What is 2 + 2?</text>
    <text x="44" y="430">&gt; 1. 3</text>
    <text x="44" y="465">  2. 4</text>
    <text x="44" y="500">  3. 5</text>
  </g>

  <text x="44" y="536" fill="#93c5fd" font-family="Menlo, Monaco, Consolas, monospace" font-size="18">Use ↑/↓ to move, Space to select, Enter to submit</text>
</svg>
